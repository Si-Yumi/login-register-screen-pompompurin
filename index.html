<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Login</title>
  </head>
  <body>
    <main>
      <div class="mainContent">
        <div class="erroText"><p>Isto é apenas um teste...</p></div>

        <img
          src="assets/purin text.png"
          alt="purin-logo"
          height="200px"
          draggable="false"
        />

        <div class="loginCard" id="loginCard">
          <img
            class="purinIcon"
            src="assets/purin icon.png"
            alt="pumpumpurin-icon"
            height="80px"
            draggable="false"
          />

          <label for="user">Login:</label>

          <br />

          <input type="text" name="text" placeholder="Nome de usuário" />

          <br />

          <label for="password">Senha:</label>

          <br />

          <input type="password" name="password" placeholder="Sua senha" />

          <br /><br />

          <button class="loginButton" id="loginButton">Entrar</button>
        </div>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
